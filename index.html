<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Watch on TikTok</title>
    <style>
        body { 
            background-color: #010101; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Flèche pointant vers les trois points */
        .arrow-container {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
        }

        .arrow {
            width: 35px;
            height: 35px;
            border-top: 6px solid #ff0050;
            border-right: 6px solid #ff0050;
            transform: rotate(-45deg); 
            animation: bouncePoint 0.7s infinite alternate;
        }

        @keyframes bouncePoint {
            0% { transform: rotate(-45deg) translate(0, 0); }
            100% { transform: rotate(-45deg) translate(12px, -12px); }
        }

        .content {
            margin-top: 50px;
            text-align: left;
        }

        h2 { 
            color: #ff0050; 
            font-size: 1.3rem; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        hr { border: 0; border-top: 1px solid #333; margin: 35px 0; }
        
        .step { margin: 12px 0; font-size: 1.1rem; line-height: 1.4; }
        .highlight { color: #ff0050; font-weight: bold; }
        .dots { font-size: 1.6rem; font-weight: bold; vertical-align: middle; }

    </style>
</head>
<body>

    <div class="arrow-container">
        <div class="arrow"></div>
    </div>

    <div class="content">
        <div class="instruction">
            <h2>Instagram bloque cette vidéo</h2>
            <p class="step">1. Cliquez sur les <span class="dots">•••</span> en haut à droite.</p>
            <p class="step">2. Sélectionnez <span class="highlight">"Ouvrir dans un navigateur externe"</span>.</p>
        </div>

        <hr>

        <div class="instruction">
            <h2>Instagram is blocking this video</h2>
            <p class="step">1. Click on the <span class="dots">•••</span> at the top right.</p>
            <p class="step">2. Select <span class="highlight">"Open in external browser"</span>.</p>
        </div>
    </div>

    <script>
        const tiktokUrl = "https://www.tiktok.com/@megan.music.tiktok/video/7630919827757993238";
        // Tentative de redirection automatique
        window.location.replace(tiktokUrl);
    </script>
</body>
</html>
