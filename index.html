<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection TikTok...</title>
    <style>
        body { background-color: #010101; color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .btn { background-color: #ff0050; color: white; text-decoration: none; padding: 20px 40px; border-radius: 50px; font-weight: bold; font-size: 1.4rem; box-shadow: 0 0 20px rgba(255,0,80,0.5); margin-bottom: 20px; display: inline-block; }
        .info { color: #888; font-size: 0.9rem; padding: 0 30px; line-height: 1.4; }
        .dots { color: #ff0050; font-weight: bold; }
    </style>
</head>
<body>

    <a href="https://www.tiktok.com/@megan.music.tiktok/video/7358172346743934241" id="open-link" class="btn">OUVRIR DANS TIKTOK</a>

    <div class="info">
        L'application devrait s'ouvrir...<br><br>
        Si rien ne se passe, cliquez sur les <span class="dots">•••</span> en haut à droite et sélectionnez <span class="dots">"Ouvrir dans le navigateur"</span>.
    </div>

    <script>
        // L'URL de ta vidéo (utilise l'ID long de la vidéo si possible, sinon ton lien court)
        const webUrl = "https://vm.tiktok.com/ZNRqsMtn6/";
        // Le lien "Deep" qui force l'app sur iOS/Android
        const appUrl = "snssdk1233://aweme/detail/7358172346743934241"; 

        function tryOpen() {
            // Tentative 1 : Forcer l'App directement
            window.location.href = appUrl;
            
            // Tentative 2 : Secours Web après 500ms
            setTimeout(function() {
                window.location.href = webUrl;
            }, 500);
        }

        // Exécution automatique
        tryOpen();

        // Mise à jour du bouton manuel
        document.getElementById('open-link').onclick = function(e) {
            tryOpen();
            return false;
        };
    </script>
</body>
</html>
