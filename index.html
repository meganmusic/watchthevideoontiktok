<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Watch on TikTok</title>
    <style>
        body { 
            background-color: #010101; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Flèche pointant vers le haut à droite */
        .arrow-container {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
        }

        .arrow {
            width: 40px;
            height: 40px;
            border-top: 6px solid #ff0050;
            border-right: 6px solid #ff0050;
            transform: rotate(-45deg); /* Pointe vers le haut à droite */
            animation: bounceVertical 0.8s infinite alternate;
        }

        @keyframes bounceVertical {
            0% { transform: rotate(-45deg) translate(0, 0); }
            100% { transform: rotate(-45deg) translate(10px, -10px); }
        }

        .content {
            margin-top: 60px;
            text-align: left; /* Justifié à gauche */
        }

        h2 { color: #ff0050; font-size: 1.4rem; margin-bottom: 10px; }
        hr { border: 0; border-top: 1px solid #333; margin: 30px 0; }
        
        .instruction { margin-bottom: 25px; }
        .step { margin: 10px 0; line-height: 1.5; }
        .highlight { color: #ff0050; font-weight: bold; }
        .dots { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }

    </style>
</head>
<body>

    <div class="arrow-container">
        <div class="arrow"></div>
    </div>

    <div class="content">
        <div class="instruction">
            <h2>Version Française</h2>
            <p class="step">Pour contourner le blocage d'Instagram :</p>
            <p class="step">1. Cliquez sur les <span class="dots">•••</span> en haut à droite.</p>
            <p class="step">2. Sélectionnez <span class="highlight">"Ouvrir dans le navigateur"</span>.</p>
        </div>

        <hr>

        <div class="instruction">
            <h2>English Version</h2>
            <p class="step">To bypass Instagram's block:</p>
            <p class="step">1. Click on the <span class="dots">•••</span> at the top right.</p>
            <p class="step">2. Select <span class="highlight">"Open in browser"</span>.</p>
        </div>
    </div>

    <script>
        // Redirection automatique en fond au cas où certains navigateurs l'acceptent
        const tiktokUrl = "https://www.tiktok.com/@megan.music.tiktok/video/7630919827757993238";
        window.location.replace(tiktokUrl);
    </script>
</body>
</html>
